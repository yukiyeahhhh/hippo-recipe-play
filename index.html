<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>コビトカバの会計相談所 — 縦スライス</title>
<style>
  :root{
    --paper:#f4ead0; --dim:#7c6c4d; --ink:#33280f; --brass:#a8791f; --brass-hi:#c99a34; --brass-deep:#856019;
    --emerald:#3f7a56; --emerald-hi:#5a9e77; --red:#b23a25; --red-hi:#c25a42;
    --desk:#efe4c8; --panel:#f5ecd3; --panel2:#ecdcb8; --line:#d3bd93; --cream:#f9f2df;
    --serif:"Hiragino Mincho ProN","Yu Mincho",YuMincho,"Songti SC",Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;
    --mono:"SFMono-Regular",ui-monospace,Menlo,"Courier New",monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{background:radial-gradient(120% 55% at 50% -8%, rgba(216,178,90,.2),transparent 58%),linear-gradient(180deg,#f3ead0,#e7d8b4 60%,#dcc99f);
    color:var(--ink); font-family:var(--sans); overflow:hidden;}
  #app{max-width:460px; margin:0 auto; height:100%; position:relative; overflow:hidden}
  .screen{position:absolute; inset:0; display:none; flex-direction:column; opacity:0; transform:translateY(6px); transition:opacity .34s ease, transform .34s ease}
  .screen.on{display:flex; opacity:1; transform:none}
  .pad{padding:22px 20px}
  .scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch}

  /* B16: バストアップ立ち絵の接地影（全キャラ共通の仕組み。サイズは --cs-w/--cs-h/--cs-bottomで場面ごとに調整） */
  .char-shadow{position:relative}
  .char-shadow::after{content:""; position:absolute; left:50%; bottom:var(--cs-bottom,0); transform:translateX(-50%);
    width:var(--cs-w,70px); height:var(--cs-h,14px); background:radial-gradient(ellipse at center, rgba(40,26,8,.48), rgba(40,26,8,0) 72%);
    border-radius:50%; z-index:-1; pointer-events:none}

  .eyebrow{font-family:var(--mono); font-size:10px; letter-spacing:.28em; color:var(--brass); text-transform:uppercase}
  h1,h2{font-family:var(--serif); font-weight:600; margin:0; text-wrap:balance}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:var(--sans); font-size:15px; font-weight:700;
    color:#fbf4e0; text-shadow:0 1px 3px rgba(20,14,6,.6);
    background:linear-gradient(rgba(20,14,6,.32),rgba(20,14,6,.32)), url("assets/a/part-button.png") center/100% 100% no-repeat;
    border:none; border-radius:12px; padding:14px 22px;
    cursor:pointer; box-shadow:0 3px 0 #4e3212, 0 4px 9px rgba(58,44,18,.4); transition:transform .08s}
  .btn:active{transform:translateY(2px); box-shadow:0 1px 0 #4e3212}
  .btn:disabled{opacity:.4; cursor:default}
  .btn.ghost{background:transparent; color:var(--brass-hi); text-shadow:none; border:1px solid var(--line); box-shadow:none}
  .btn.wide{width:100%}
  .trustbar{position:absolute; top:0; left:0; right:0; z-index:6; display:flex; align-items:center; gap:10px; padding:10px 54px 10px 16px;
    background:linear-gradient(180deg,rgba(16,12,7,.94),rgba(16,12,7,0))}
  .trustbar .rk{font-family:var(--serif); font-size:13px; color:#f3ead6}
  .trustbar .tlbl{font-family:var(--mono); font-size:9.5px; letter-spacing:.06em; color:var(--dim)}
  .trustbar .tval{font-family:var(--mono); font-size:10.5px; color:var(--brass-deep); font-weight:700}
  .trustbar .mo{font-family:var(--mono); font-size:10px; color:var(--dim); margin-left:auto}
  .gauge{flex:1; height:7px; border-radius:4px; background:#2a2114; overflow:hidden; max-width:150px}
  .gauge > i{display:block; height:100%; background:linear-gradient(90deg,var(--emerald),var(--emerald-hi)); width:0; transition:width .6s cubic-bezier(.3,1,.4,1)}

  /* 事務所シーン背景（ランクで事務所そのものが変わる） */
  .officebg{position:absolute; inset:0; overflow:hidden; z-index:0}
  .officebg .wallpaper{position:absolute; inset:0; background:#f0e5c9 url("assets/a/bg-consult.png") center/cover}
  #scr-desk .officebg .wallpaper{background-image:url("assets/a/bg-desk.png")}
  [data-rank="0"] .officebg .wallpaper{background-image:url("assets/a/bg-office-t1.png")}
  [data-rank="1"] .officebg .wallpaper{background-image:url("assets/a/bg-office-t2.png")}
  [data-rank="2"] .officebg .wallpaper{background-image:url("assets/a/bg-consult.png")}
  [data-rank="3"] .officebg .wallpaper{background-image:url("assets/a/bg-office-t3.png")}
  .officebg::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(249,242,223,.1), rgba(249,242,223,.02) 40%, rgba(249,242,223,.52)); pointer-events:none}
  .officebg .window,.officebg .lamp,.officebg .floor,.officebg .rug{display:none}

  #scr-title{justify-content:center; align-items:center; text-align:center; z-index:2}

  /* 受付＝予約台帳（.ledger流用）の行 */
  .ledger .rcrow{display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid rgba(140,111,46,.18)}
  .ledger .rcrow:last-child{border-bottom:none}
  .ledger .rcrow .tm{font-family:var(--mono); font-size:10px; color:#8a6f2e; flex:0 0 auto; width:34px}
  .ledger .rcrow .face{flex:0 0 auto; font-size:22px; line-height:1}
  .ledger .rcrow .face img{width:34px; height:34px; border-radius:50%; object-fit:cover; object-position:top; display:block}
  .ledger .rcrow .info{flex:1; min-width:0}
  .ledger .rcrow .nm{font-family:var(--sans); font-size:13px; font-weight:600}
  .ledger .rcrow .biz{font-size:10.5px; color:#8a7550; margin-top:1px}
  .ledger .rcrow .memo{flex:0 0 auto; font-family:var(--serif); font-size:11px; color:#7a3a25; background:rgba(178,58,37,.08); border:1px solid rgba(178,58,37,.2); border-radius:6px; padding:3px 8px; max-width:9em; text-align:center; line-height:1.3}

  /* 来客の芝居 */
  #scr-arrive{justify-content:flex-end; z-index:2}
  .stage-office{flex:1; position:relative; overflow:hidden; z-index:1}
  .stage-office .door,.stage-office .deskline{display:none}
  .stage-office .hippo{position:absolute; left:44px; bottom:120px; font-size:52px; filter:drop-shadow(0 6px 10px rgba(0,0,0,.7))}
  .stage-office .client{position:absolute; bottom:120px; font-size:46px; left:50%; opacity:0; transition:left 1.05s cubic-bezier(.2,.7,.3,1), opacity .5s; filter:drop-shadow(0 6px 10px rgba(0,0,0,.7))}
  .stage-office .client.walk{animation:bob .5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
  .speech{margin:0 20px; background:linear-gradient(180deg,#f4ecd6,#e6dabb); color:#2a2114; border-radius:14px 14px 14px 4px; padding:14px 16px;
    font-size:14.5px; line-height:1.6; box-shadow:0 6px 18px rgba(0,0,0,.4); opacity:0; transform:translateY(6px); transition:opacity .4s .5s, transform .4s .5s}
  .speech.in{opacity:1; transform:none}
  .speech .nm{font-family:var(--serif); font-weight:600; font-size:12px; color:var(--brass-deep); display:block; margin-bottom:3px}
  #scr-arrive .btn{margin:16px 20px 26px; opacity:0; transition:opacity .4s .9s}
  #scr-arrive .btn.in{opacity:1}

  #scr-desk{z-index:2}
  .deskhead{padding:52px 18px 8px; display:flex; align-items:center; gap:11px; position:relative; z-index:1}
  .deskhead .face{font-size:30px; line-height:1}
  .deskhead .face img{width:40px; height:40px; border-radius:50%; object-fit:cover; object-position:top; display:block; box-shadow:0 2px 5px rgba(80,55,20,.3)}
  .deskhead .who{font-family:var(--serif); font-size:15px; color:#f3ead6}
  .deskhead .worry{font-size:11.5px; color:#c3b699; margin-top:1px; max-width:26ch; line-height:1.4}
  /* 相談カルテ（誰の帳簿か＋進行が常に見えるヘッダーカード） */
  .kartecard{margin:32px 18px 16px; background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:16px;
    padding:14px 16px 13px; box-shadow:0 8px 22px rgba(80,55,20,.2); position:relative; z-index:1}
  .karte-top{display:flex; align-items:flex-start; gap:11px}
  .karte-top .face{font-size:30px; flex:0 0 auto; line-height:1}
  .karte-top .face img{width:38px; height:38px; border-radius:50%; object-fit:cover; object-position:top; display:block; box-shadow:0 2px 5px rgba(80,55,20,.3)}
  .karte-top .who-wrap{flex:1; min-width:0}
  .karte-top .who{font-family:var(--serif); font-size:15px; color:var(--ink)}
  .karte-top .worry{font-size:13px; color:var(--dim); margin-top:2px; line-height:1.5}
  .karte-top .helpbtn{flex:0 0 auto}
  .steps{display:flex; align-items:center; gap:4px; margin:11px 0 0; font-family:var(--mono); font-size:9.5px; letter-spacing:.02em}
  .steps .step{display:inline-flex; align-items:center; gap:3px; padding:3px 8px; border-radius:20px; color:var(--dim); white-space:nowrap}
  .steps .step i{font-style:normal}
  .steps .step.active{background:var(--brass); color:#fff; font-weight:700}
  .steps .step.done{color:var(--emerald)}
  .steps .step-arrow{color:var(--line); font-size:9px}
  .kartecard .hint{margin:10px 0 0; font-size:13px; line-height:1.55}
  .karte-insights{margin:10px 18px 0; display:none; background:rgba(63,122,86,.08); border:1px solid rgba(63,122,86,.22); border-radius:10px; padding:9px 12px}
  .karte-insights.show{display:block}
  .karte-insights .lbl{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--emerald); display:block; margin-bottom:4px}
  .karte-insights .irow{font-size:12.5px; line-height:1.55; color:#3e5142}
  .karte-insights .irow::before{content:"・"; color:var(--brass)}

  /* ゾーニング（帳簿／道具／相談を余白と見出しで区切る） */
  .zone{margin:18px 0 0; position:relative; z-index:1}
  .zone-hd{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--brass-deep);
    margin:0 18px 8px; padding:4px 10px; background:rgba(249,242,223,.88); border:1px solid var(--line); border-radius:8px; box-shadow:0 2px 6px rgba(80,55,20,.18)}
  .zone-hd::before{content:""; width:3px; height:10px; border-radius:2px; background:var(--brass); display:inline-block}
  #dk-inspect.actionrow{margin:0; padding:14px 18px 24px; border-top:1px solid var(--line); position:relative; z-index:1}

  /* 先輩カバのガイド吹き出し */
  .senpai{margin:2px 18px 8px; display:none; align-items:flex-start; gap:9px; animation:sfade .3s ease; position:relative; z-index:1}
  .senpai.on{display:flex}
  @keyframes sfade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
  .senpai .av{font-size:30px; flex:0 0 auto; filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
  .senpai .bub{background:linear-gradient(180deg,#26331f,#1c2717); border:1px solid rgba(143,208,164,.3); border-radius:12px 12px 12px 3px; padding:10px 13px; font-size:12.5px; line-height:1.6; color:#cfe6d3}
  .senpai .bub b{color:var(--emerald-hi)}
  .senpai .bub .lbl{font-family:var(--serif); font-weight:600; font-size:10.5px; color:var(--emerald-hi); display:block; margin-bottom:3px}

  .doctabs{display:flex; gap:8px; padding:2px 18px 6px; position:relative; z-index:1}
  .doctab{flex:1; font-family:var(--sans); font-size:12.5px; font-weight:600; padding:9px; border-radius:10px 10px 0 0; background:linear-gradient(180deg,#241b0f,#1a1409); color:#9a8a68; border:1px solid var(--line); border-bottom:none; cursor:pointer}
  .doctab.on{background:linear-gradient(180deg,#f4ecd6,#ece1c6); color:#241b0e}
  .doctab small{display:block; font-family:var(--mono); font-size:8.5px; letter-spacing:.06em; opacity:.7; font-weight:400}

  /* ==== B8: desk画面のタブ式改修（常時1行サマリ＋帳簿/問診/見立てタブ切替。flags解禁ケース=S4以降のみ有効） ==== */
  .desksummary{display:flex; align-items:center; gap:14px; margin:14px 18px 0; padding:9px 14px;
    background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:12px 12px 0 0; border-bottom:none; position:relative; z-index:1}
  .ds-item{white-space:nowrap}
  .ds-item:first-child{margin-right:auto}
  .ds-item:not(:first-child){text-align:right}
  .ds-l{font-family:var(--mono); font-size:8.5px; letter-spacing:.06em; color:var(--brass-deep)}
  .ds-v{font-family:var(--mono); font-size:13px; font-weight:700; color:#241b0e}
  .ds-v small{font-size:8.5px; margin-left:4px; padding:1px 4px; border-radius:4px}
  .ds-v small.good{color:#2f6b47; background:rgba(87,148,107,.16)}
  .ds-v small.bad{color:#7a3a25; background:rgba(178,58,37,.14)}

  .tabs{display:flex; margin:0 18px; position:relative; z-index:1}
  .tab{flex:1; text-align:center; font-family:var(--sans); font-size:12.5px; font-weight:700; padding:10px 4px;
    background:linear-gradient(180deg,#e6d6b2,#dcc99f); color:#8a7550; border:1px solid var(--line); border-top:none; cursor:pointer; transition:background .15s, color .15s}
  .tab.on{background:linear-gradient(180deg,var(--panel),var(--panel2)); color:var(--ink); box-shadow:inset 0 3px 0 var(--brass)}
  .tab.locked{color:#a89b7c; cursor:default; opacity:.7}
  .tab .n{display:block; font-size:8.5px; font-family:var(--mono); font-weight:400; margin-top:2px; color:var(--brass-deep)}
  .tab.locked .n{color:#a89b7c}
  @media (max-width:400px){ .tab{font-size:11px; padding:8px 2px} .tab .n{font-size:7.5px} .ds-l{font-size:8px} .ds-v{font-size:11.5px} .desksummary{gap:8px; padding:8px 10px} }

  .scroll.tabbed{margin:0 18px; background:linear-gradient(180deg,#f8f1da,#f0e6c9); border:1px solid var(--line); border-top:none; border-radius:0 0 10px 10px; padding:14px 14px 4px; box-shadow:0 8px 20px rgba(80,55,20,.18)}
  .scroll.tabbed .pane > *:first-child{margin-top:0}
  .scroll.tabbed .zone-hd, .scroll.tabbed .ledger, .scroll.tabbed .calc, .scroll.tabbed .choices,
  .scroll.tabbed .heard, .scroll.tabbed .askcount, .scroll.tabbed .karte-insights,
  .scroll.tabbed #dk-inspect.actionrow, .scroll.tabbed .stampbar{ margin-left:0; margin-right:0; padding-left:0; padding-right:0; }

  .ledger{margin:0 18px 0; background:linear-gradient(180deg,#f4ecd6,#ece1c6); color:#241b0e; border-radius:0 0 6px 6px; box-shadow:0 8px 26px rgba(0,0,0,.45); overflow:hidden; border-left:3px solid var(--red); position:relative; z-index:1}
  .ledger.tabbed{border-radius:0 6px 6px 6px}
  .ledger.shake{animation:pshake .4s}
  @keyframes pshake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px) rotate(-.3deg)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
  .ledger .lhd{font-family:var(--serif); font-weight:600; font-size:13px; padding:9px 14px 7px; border-bottom:1px double #c9b79b; display:flex; justify-content:space-between; align-items:baseline; background:rgba(198,162,76,.12)}
  .ledger .lhd small{font-family:var(--mono); font-weight:400; font-size:9.5px; color:#8a6f2e}
  .plrow{display:flex; justify-content:space-between; align-items:center; padding:9px 14px; font-size:13.5px; border-bottom:1px solid rgba(140,111,46,.18); position:relative; transition:background .15s}
  .plrow.pick{cursor:pointer}
  .plrow .nm{font-family:var(--sans)}
  .plrow .delta{font-family:var(--mono); font-size:9.5px; margin-left:7px; padding:1px 5px; border-radius:4px}
  .plrow .delta.bad{color:#7a3a25; background:rgba(178,58,37,.14)}
  .plrow .delta.good{color:#2f6b47; background:rgba(87,148,107,.16)}
  .plrow .amt{font-family:var(--mono); font-variant-numeric:tabular-nums; font-weight:600; font-size:13.5px}
  .plrow.total{border-top:1px double #c9b79b; font-weight:700; background:rgba(198,162,76,.08)}
  .plrow.flag{background:rgba(198,162,76,.28); box-shadow:inset 3px 0 0 var(--brass-deep)}
  .plrow.flag::after{content:"📌"; position:absolute; right:-3px; top:50%; transform:translateY(-50%); font-size:12px}

  .calc{margin:12px 18px 0; background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:12px; overflow:hidden; position:relative; z-index:1}
  .calc.guided{border-color:rgba(143,208,164,.4)}
  .calc-hd{font-size:12px; font-weight:600; color:var(--brass-hi); padding:10px 14px; display:flex; align-items:center; gap:7px}
  .calc-hd .sub{font-family:var(--mono); font-size:9px; color:var(--dim); font-weight:400; margin-left:auto}
  .calc-row{display:flex; align-items:center; gap:6px; padding:0 14px 12px}
  .calc-row select{flex:1; min-width:0; font-family:var(--sans); font-size:12.5px; padding:9px 6px; border-radius:8px; background:#2a2013; color:#eaddb4; border:1px solid var(--line); -webkit-appearance:none; appearance:none}
  .calc-row .div{font-family:var(--serif); font-size:16px; color:var(--brass); flex:0 0 auto}
  .calc-row .go{flex:0 0 auto; font-size:12.5px; font-weight:600; color:#20180c; background:linear-gradient(180deg,var(--brass-hi),var(--brass)); border:none; border-radius:8px; padding:9px 12px; cursor:pointer}
  .calc-results{padding:0 14px 12px; display:flex; flex-direction:column; gap:6px}
  .calc-results:empty{display:none}
  .cres{display:flex; align-items:center; gap:8px; background:#1c1509; border:1px solid var(--line); border-radius:8px; padding:8px 11px; animation:sfade .25s}
  .cres.known{border-color:rgba(198,162,76,.5); background:rgba(198,162,76,.1)}
  .cres .cl{font-size:12.5px; color:#e9dfc9}
  .cres .cl.k{font-family:var(--serif); font-weight:600; color:var(--brass-hi)}
  .cres .cv{margin-left:auto; font-family:var(--mono); font-variant-numeric:tabular-nums; font-weight:700; font-size:13px; color:#f3ead6}
  .cres .cp{font-family:var(--mono); font-size:9.5px; color:var(--dim); margin-left:6px}

  .hint{margin:12px 18px 0; font-size:12px; color:#b7a988; line-height:1.6; display:flex; gap:8px; position:relative; z-index:1}
  .hint::before{content:"›"; color:var(--brass)}
  .hint b{color:var(--brass-hi)}

  .choices{padding:12px 18px 10px; display:flex; flex-direction:column; gap:9px; position:relative; z-index:1}
  .choice{text-align:left; width:100%; background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line); border-radius:12px; padding:13px 15px; color:#e9dfc9; font-size:13.5px; line-height:1.5; cursor:pointer; transition:border-color .15s, transform .08s; font-family:var(--sans)}
  .choice:active{transform:translateY(1px)}
  .choice.sel{border-color:var(--brass); background:linear-gradient(rgba(198,162,76,.16),rgba(198,162,76,.16)),linear-gradient(180deg,var(--panel),var(--panel2))}
  .choice.done{opacity:.45}
  .choice .q{font-weight:600}
  .choice .ans{display:block; margin-top:6px; font-size:12.5px; color:#a9c9b4; font-style:italic}
  .askcount{padding:2px 18px 4px; font-family:var(--mono); font-size:10.5px; color:var(--brass); position:relative; z-index:1}
  .heard{padding:0 18px; display:flex; flex-direction:column; gap:6px; margin:2px 0 6px; position:relative; z-index:1}
  .heardrow{background:rgba(87,148,107,.09); border:1px solid rgba(87,148,107,.22); border-radius:9px; padding:8px 12px; font-size:12px; line-height:1.5; animation:sfade .25s}
  .heardrow b{color:var(--emerald-hi); font-family:var(--serif); font-weight:600}

  .stampbar{margin-top:8px; padding:20px 18px 26px; border-top:1px solid var(--line); position:relative; z-index:1}
  .stamp-btn{width:100%; background:linear-gradient(180deg,#c14a34,#9c3421); color:#fff; border:none; border-radius:12px; padding:15px; font-family:var(--serif); font-weight:700; font-size:16px; letter-spacing:.05em; cursor:pointer; box-shadow:0 3px 0 #6e2415; transition:transform .08s, opacity .2s, filter .2s}
  .stamp-btn:active{transform:translateY(2px); box-shadow:0 1px 0 #6e2415}
  .stamp-btn:disabled{background:linear-gradient(180deg,#9c8f78,#7d7360); opacity:.55; filter:grayscale(.5); cursor:not-allowed; box-shadow:0 3px 0 #5c5544}
  .stamp-hint{text-align:center; font-size:11.5px; color:var(--dim); margin-top:8px; letter-spacing:.02em}

/* ===== 効果音（WebAudio・軽量） ===== */
let AC=null, muted=false;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
function tone(freq,dur,type,vol,delay){ const c=ac(); if(!c||muted) return; const t=c.currentTime+(delay||0);
  const o=c.createOscillator(), g=c.createGain(); o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||.15,t+.01); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur+.02); }
function noise(dur,vol){ const c=ac(); if(!c||muted) return; const b=c.createBuffer(1,c.sampleRate*dur,c.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length); const s=c.createBufferSource(); s.buffer=b;
  const g=c.createGain(); g.gain.value=vol||.2; s.connect(g); g.connect(c.destination); s.start(); }
function sfx(k){
  if(k==='stamp'){ noise(.16,.3); tone(120,.18,'sine',.35); tone(70,.22,'sine',.3,.02); }
  else if(k==='good'){ tone(660,.12,'triangle',.16); tone(880,.16,'triangle',.16,.09); tone(1180,.2,'triangle',.13,.18); }
  else if(k==='page'){ noise(.05,.12); tone(300,.05,'square',.08); }
  else if(k==='tap'){ tone(520,.05,'sine',.08); }
  else if(k==='promote'){ [523,659,784,1046].forEach((f,i)=>tone(f,.5,'triangle',.16,i*.13)); tone(1568,.7,'sine',.1,.5); }
  else if(k==='arrive'){ tone(440,.1,'sine',.1); tone(587,.14,'sine',.1,.08); }
}

  document.getElementById('dk-ledger').classList.add('shake'); fx.classList.add('on'); requestAnimationFrame(()=>fx.classList.add('hit')); sfx('stamp');
  setTimeout(()=>{ fx.classList.remove('on','hit'); document.getElementById('dk-ledger').classList.remove('shake');
    const d=cur.c.diag[cur.diagIdx];
    S.karte.push({caseRef:cur.c, diagIdx:cur.diagIdx});
    if(d.clientReply){ showClientReply(d.clientReply); } else { advanceAfterStamp(); }
  },820); }
function advanceAfterStamp(){ S.mi++; if(S.mi<S.monthCases.length) nextClient(); else toPass(); }
/* ---- B13：診断→処方のあと、お客の受けの一言（正誤は伏せる） ---- */
function showClientReply(text){
  document.getElementById('dk-stampbar').style.display='none';
  document.getElementById('dk-diag').style.display='none';
  const box=document.getElementById('dk-clientreply'); box.style.display='';
  box.innerHTML=`<div class="speech in" style="margin:0 0 4px"><span class="nm">${cur.c.who}</span>${text}</div>`+
    `<button class="btn wide" onclick="afterClientReply()">次へ</button>`; }
function afterClientReply(){ sfx('tap'); document.getElementById('dk-clientreply').style.display='none'; advanceAfterStamp(); }

/* ---- 1ヶ月後 ---- */
function toPass(){ show('scr-pass'); const cal=document.getElementById('pass-cal'), mn=document.getElementById('pass-mn');
  let n=0; const days=['1日','10日','20日','末日']; mn.textContent='';
  const iv=setInterval(()=>{ cal.classList.remove('flip'); void cal.offsetWidth; cal.classList.add('flip'); sfx('page'); mn.textContent=days[n]; n++;
    if(n>=days.length){ clearInterval(iv); setTimeout(()=>{ buildResults(); show('scr-results'); },700); } }, 420); }

/* ---- 結果 ---- */
function buildResults(){ let hit=0; S.karte.forEach(k=>{ if(k.caseRef.diag[k.diagIdx].ok) hit++; });
  S._trustBefore=S.trust; S.trust+=hit;
  document.getElementById('rs-list').innerHTML=S.karte.map((k,idx)=>{ const d=k.caseRef.diag[k.diagIdx], ok=d.ok;
    return `<div class="sumcard" style="animation-delay:${idx*.08}s" onclick="showDetail(${idx})"><span class="face">${k.caseRef.artW?`<img src="${k.caseRef.artW}" alt="">`:k.caseRef.face}</span>
      <div><div class="who">${k.caseRef.who}</div><div class="my">あなたの診断：${d.t}</div></div>
      <div class="verdict"><div class="vv ${ok?'hit':'miss'}">${ok?'的中':'見当違い'}</div><div class="arrow">顛末を見る ›</div></div></div>`; }).join('');
  // カウントアップ
  const big=document.getElementById('rs-score'); let v=0; big.textContent='0 / '+S.karte.length;
  const iv=setInterval(()=>{ v++; big.textContent=v+' / '+S.karte.length; sfx('good'); if(v>=hit){ clearInterval(iv); } if(hit===0) clearInterval(iv); }, 260);
  if(hit===0) big.textContent='0 / '+S.karte.length;
  paintTrust(); }
function showDetail(idx){ sfx('tap'); const k=S.karte[idx], c=k.caseRef, d=c.diag[k.diagIdx];
  const dtFace=document.getElementById('dt-face');
  if(c.artW){ dtFace.innerHTML='<img src="'+c.artW+'" alt="">'; } else { dtFace.textContent=c.face; }
  document.getElementById('dt-who').textContent=c.who; document.getElementById('dt-my').textContent='助言：'+d.advise;
  const hasAfter=Object.keys(d.after).length>0;
  const afterHitsBS = c.bs && Object.keys(d.after).some(k=>c.bs.find(r=>r.k===k));
  const base = c.pl.concat(afterHitsBS ? c.bs : []);
  if(!hasAfter){ document.getElementById('dt-ba').innerHTML=
      `<div class="baCol" style="flex:1"><div class="bt">この会社の決算</div>${c.pl.map(r=>`<div class="brow"><span>${r.nm}</span><span class="amt">${money(r.v)}</span></div>`).join('')}</div>`; }
  else { const beforeRows=base.map(r=>`<div class="brow"><span>${r.nm}</span><span class="amt">${money(r.v)}</span></div>`).join('');
    const afterRows=base.map(r=>{ const ch=d.after[r.k]!=null, av=ch?d.after[r.k]:r.v; return `<div class="brow ${ch?'key':''}"><span>${r.nm}</span><span class="amt">${money(av)}</span></div>`; }).join('');
    document.getElementById('dt-ba').innerHTML=`<div class="baCol"><div class="bt">診断前</div>${beforeRows}</div><div class="baCol after"><div class="bt">1ヶ月後</div>${afterRows}</div>`; }
  document.getElementById('dt-verdict').innerHTML=`<span class="v ${d.ok?'hit':'miss'}">${d.ok?'その読み、当たり':'惜しい、見当違い'}</span>`;
  const ca=document.getElementById('dt-cause'); ca.className='cause'+(d.ok?'':' miss'); ca.innerHTML=d.cause;
  const rv=document.getElementById('dt-reveal'); if(c.reveal){ rv.style.display=''; rv.innerHTML='<span class="rl">コツ ── 種明かし</span>'+c.reveal; } else rv.style.display='none';
  const reactArt = d.ok ? (c.artH||c.artW) : c.artW;
  const reactMark = reactArt ? `<div class="em-wrap char-shadow"><img class="em" src="${reactArt}" alt=""></div>` : `<span class="em">${d.react?d.react.em:(d.ok?'✨':'💦')}</span>`;
  document.getElementById('dt-react').innerHTML=reactMark+`${d.react?d.react.t:''}`;
  if(d.ok) sfx('good'); show('scr-detail'); }

/* ---- B21：月締め＝月報 ---- */
function toClose(){ sfx('tap'); let hit=0; S.karte.forEach(k=>{ if(k.caseRef.diag[k.diagIdx].ok) hit++; });
  const total=S.karte.length;
  document.getElementById('cl-eyebrow').textContent=S.month+'月の月報';
  document.getElementById('cl-title').textContent=RANKS[S.rank]+'の一ヶ月';
  document.getElementById('cl-faces').innerHTML=S.karte.map(k=>{ const c=k.caseRef, ok=c.diag[k.diagIdx].ok;
    const img=c.artW?`<img src="${c.artW}" alt="">`:`<div style="font-size:32px; text-align:center">${c.face}</div>`;
    return `<div class="cl-face">${img}<span class="mk ${ok?'hit':'miss'}">${ok?'○':'×'}</span></div>`; }).join('');
  const before=(S._trustBefore!=null)?S._trustBefore:(S.trust-hit), after=S.trust;
  document.getElementById('cl-trust-delta').innerHTML = hit>0?('<b>+'+hit+'</b>'):'±0';
  const gaugeEl=document.getElementById('cl-gauge'); const gB=Math.min(100,before/3*100), gA=Math.min(100,after/3*100);
  gaugeEl.style.transition='none'; gaugeEl.style.width=gB+'%';
  requestAnimationFrame(()=>{ void gaugeEl.offsetWidth; gaugeEl.style.transition='width 1s cubic-bezier(.3,1,.4,1)'; gaugeEl.style.width=gA+'%'; });
  let senpaiLine;
  if(total>0 && hit===total) senpaiLine='完璧だ。この調子。';
  else if(hit===0) senpaiLine='落ち込むな。原因はカルテに残ってる。';
  else senpaiLine='外した相談こそ財産だ。月報を見返しておこう。';
  document.getElementById('cl-senpai-txt').innerHTML=senpaiLine;

  S.campIdx += S.monthCases.length;
  const done = S.campIdx>=CAMPAIGN.length;
  const nextRank = done ? S.rank : CAMPAIGN[S.campIdx].rank;
  const nextBatch = done ? [] : CAMPAIGN.slice(S.campIdx, S.campIdx+2);
  const nextEl=document.getElementById('cl-next');
  if(done){ nextEl.innerHTML='<div class="hd">この先</div><p>キャンペーンはここまで。よくここまで登ったね。</p>'; }
  else {
    const willUnlock = pendingUnlockKeys(nextBatch).length>0;
    nextEl.innerHTML = `<div class="hd">来月の予約</div>
      <div class="cl-next-faces">${nextBatch.map(c=>c.artW?`<img src="${c.artW}" alt="">`:`<div style="font-size:26px">${c.face}</div>`).join('')}</div>
      <p>来月は${nextBatch.length}件の予約。${nextRank>S.rank?'来月、昇進の気配がある。':''}${willUnlock?'新しい仕事の話もある。':''}</p>`;
  }
  paintTrust(); show('scr-close'); }

/* ---- B10：昇進＝進化カットシーン（前後に会話を挟む） ---- */
function playPromote(newRank, done){ pendingAfterPromote=done;
  const preLine='…君、もう気づいてるかい。お客さんの顔が、帰る時みんな明るい。<b>君はもう'+RANKS[newRank]+'だ。</b>';
  playADV([preLine], ()=>runPromoteAnim(newRank), {avatar:'assets/a/hippo-happy.png', skip:false, lastLabel:'ありがとうございます…！'});
}
function runPromoteAnim(newRank){ S.rank=newRank;
  document.getElementById('pr-bg-old').style.backgroundImage='url("'+RANK_BG[newRank-1]+'")';
  document.getElementById('pr-bg-new').style.backgroundImage='url("'+RANK_BG[newRank]+'")';
  if(newRank===1){ document.getElementById('pr-nm').textContent='見習い、卒業！'; document.getElementById('pr-un').innerHTML='小さな個室と名札をもらった。次はもっと難しい相談が来る。'; }
  else { document.getElementById('pr-nm').textContent=RANKS[newRank]+' に昇格'; document.getElementById('pr-un').innerHTML=RANK_UNLOCK[newRank]; }
  const scr=document.getElementById('scr-promote'); show('scr-promote'); scr.classList.remove('play'); void scr.offsetWidth; scr.classList.add('play');
  sfx('promote'); spawnSparks();
}
let pendingAfterPromote=null;
const POST_UNLOCK_NOUN=['','少し大きな相談','B/Sを使う相談','大口や危機の相談'];
function afterPromote(){ sfx('tap'); setRankBg(S.rank);
  const postLine='新しい机だ。これからは<b>'+POST_UNLOCK_NOUN[S.rank]+'</b>も任せる。';
  playADV([postLine], ()=>{ const f=pendingAfterPromote; pendingAfterPromote=null; if(f) f(); }, {avatar:'assets/a/hippo-happy.png', skip:false, lastLabel:'次へ'});
}
function spawnSparks(){ const scr=document.getElementById('scr-promote'); scr.querySelectorAll('.spark').forEach(s=>s.remove());
  for(let i=0;i<14;i++){ const s=document.createElement('div'); s.className='spark'; const ang=Math.random()*Math.PI*2, dist=90+Math.random()*120;
    s.style.left='50%'; s.style.top='42%'; scr.appendChild(s);
    const dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
    s.animate([{transform:'translate(-50%,-50%) scale(1)',opacity:1},{transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(0)`,opacity:0}],
      {duration:900+Math.random()*500, delay:500+Math.random()*300, easing:'cubic-bezier(.2,.8,.3,1)', fill:'forwards'}); }
}

/* ---- B9/B10/B19共通：先輩ADVの汎用ドライバ（scr-adv） ---- */
let ADV={lines:[],onDone:null,idx:0,lastLabel:'次へ'};
function playADV(lines, onDone, opts){ opts=opts||{};
  ADV={lines, onDone, idx:0, lastLabel:opts.lastLabel||'次へ'};
  document.getElementById('adv-av').src = opts.avatar||'assets/a/hippo-happy.png';
  document.getElementById('adv-skip').style.display = opts.skip ? '' : 'none';
  renderADV(); show('scr-adv'); }
function renderADV(){ document.getElementById('adv-txt').innerHTML=ADV.lines[ADV.idx];
  document.getElementById('adv-next').textContent = ADV.idx<ADV.lines.length-1 ? '次へ' : ADV.lastLabel; }
function advNext(){ sfx('tap'); ADV.idx++; if(ADV.idx>=ADV.lines.length){ const d=ADV.onDone; ADV.onDone=null; if(d) d(); return; } renderADV(); }
function advSkip(){ sfx('tap'); const d=ADV.onDone; ADV.onDone=null; if(d) d(); }

function showEnding(){ setRankBg(3);
  document.getElementById('cl-eyebrow').textContent='見習い、卒業';
  document.getElementById('cl-title').textContent='見習い、卒業';
  document.getElementById('cl-faces').innerHTML='';
  document.getElementById('cl-trust-delta').innerHTML='';
  document.getElementById('cl-gauge').style.transition='none'; document.getElementById('cl-gauge').style.width=Math.min(100,S.trust/3*100)+'%';
  document.getElementById('cl-senpai-txt').innerHTML='すべての相談を診てきた。数字の裏の物語を読み、盲点をやさしく明かすコンサルに。';
  document.getElementById('cl-next').innerHTML='<div class="hd">この先</div><p>（この先＝お客量産・ボス相談・運営費は理想側）</p>';
  const btn=document.querySelector('#scr-close .btn'); btn.textContent='もう一度はじめから'; btn.setAttribute('onclick','startGame()');
  show('scr-close'); }

/* ===== 撮影モード（?scene=<name>）：既存関数を呼ぶだけの薄いマップ。視覚QAの一括撮影用 ===== */
const SCENES = {
  'title': ()=>{ show('scr-title'); },
  'intro': ()=>{ startGame(); },
  'reception0': ()=>{ S.campIdx=0; S.rank=0; S.trust=0; S.month=0; S.unlocked={calc:false,hearing:false,bsTab:false}; startMonth(); },
  'reception3': ()=>{ S.rank=3; S.month=6; beginMonth(CAMPAIGN.slice(12,14)); },
  'arrive-s0': ()=>{ S.campIdx=0; S.rank=0; S.trust=0; S.month=0; S.unlocked={calc:false,hearing:false,bsTab:false}; startMonth(); nextClient(); },
  'arrive-s8': ()=>{ S.rank=3; S.trust=9; S.month=7; S.monthCases=CAMPAIGN.slice(12,14); S.mi=0; setRankBg(3); paintTrust(); nextClient(); },
  'desk-s0': ()=>{ S.campIdx=0; S.rank=0; S.trust=0; S.month=0; S.unlocked={calc:false,hearing:false,bsTab:false}; startMonth(); nextClient(); toDesk(); },
  'desk-r1': ()=>{ S.rank=1; S.trust=4; S.month=3; S.monthCases=CAMPAIGN.slice(4,6); S.mi=1; setRankBg(1); toDesk(); },
  'desk-tabs-fresh': ()=>{ S.rank=1; S.trust=5; S.month=4; S.campIdx=6; S.monthCases=CAMPAIGN.slice(6,8); S.mi=0; setRankBg(1); paintTrust(); toDesk(); },
  'desk-tabs-bs': ()=>{ S.rank=2; S.trust=7; S.month=6; S.campIdx=10; S.monthCases=CAMPAIGN.slice(10,12); S.mi=0; setRankBg(2); paintTrust(); toDesk(); openDoc('bs'); },
  'desk-hearing': ()=>{ S.rank=1; S.trust=5; S.month=4; S.monthCases=CAMPAIGN.slice(6,8); S.mi=0; setRankBg(1); toDesk(); toNext(); },
  'desk-hearing-thread': ()=>{ S.rank=1; S.trust=5; S.month=4; S.monthCases=CAMPAIGN.slice(6,8); S.mi=0; setRankBg(1); toDesk(); toggleFlag('sga'); toNext(); },
  'desk-tools': ()=>{ S.rank=2; S.trust=7; S.month=6; S.monthCases=CAMPAIGN.slice(10,12); S.mi=0; setRankBg(2); toDesk(); openDoc('bs');
    const ns=document.getElementById('calc-num'), ds=document.getElementById('calc-den'); if(ns&&ds){ ns.value='equity'; ds.value='assets'; }
    runCalc(); },
  'desk-diag': ()=>{ S.rank=2; S.trust=7; S.month=6; S.monthCases=CAMPAIGN.slice(10,12); S.mi=1; setRankBg(2); toDesk(); toNext(); },
  'desk-diag-propose': ()=>{ S.rank=1; S.trust=5; S.month=4; S.monthCases=CAMPAIGN.slice(6,8); S.mi=0; setRankBg(1); toDesk(); document.getElementById('dk-inspect').style.display='none'; toDiag(); },
  'client-reply': ()=>{ S.rank=1; S.trust=5; S.month=4; S.monthCases=CAMPAIGN.slice(6,8); S.mi=0; setRankBg(1); toDesk(); document.getElementById('dk-inspect').style.display='none'; toDiag(); pickDiag(1); doStamp(); },
  'senpai': ()=>{ S.rank=1; S.trust=4; S.month=3; S.monthCases=CAMPAIGN.slice(4,6); S.mi=1; setRankBg(1); toDesk(); toggleSenpai(); },
  'help': ()=>{ S.rank=0; S.trust=1; S.month=1; S.monthCases=CAMPAIGN.slice(0,2); S.mi=0; setRankBg(0); toDesk(); openHelp(); },
  'pass': ()=>{ toPass(); },
  'results': ()=>{ S.rank=2; S.trust=7; S.month=6; setRankBg(2); S.monthCases=CAMPAIGN.slice(10,12);
    S.karte=[{caseRef:CAMPAIGN[10],diagIdx:0},{caseRef:CAMPAIGN[11],diagIdx:0}];
    buildResults(); show('scr-results'); },
  'detail-ok': ()=>{ S.karte=[{caseRef:CAMPAIGN[0],diagIdx:0}]; showDetail(0); },
  'detail-reveal': ()=>{ S.karte=[{caseRef:CAMPAIGN[12],diagIdx:2}]; showDetail(0); },
  'close': ()=>{ S.rank=0; S.trust=2; S.month=1; setRankBg(0); S.campIdx=0; S.monthCases=CAMPAIGN.slice(0,2);
    S.karte=[{caseRef:CAMPAIGN[0],diagIdx:0},{caseRef:CAMPAIGN[1],diagIdx:0}];
    toClose(); },
  'monthly-report': ()=>{ S.rank=1; S.trust=5; S.month=4; setRankBg(1); S.unlocked={calc:true,hearing:true,bsTab:false}; S.campIdx=6; S.monthCases=CAMPAIGN.slice(6,8);
    S.karte=[{caseRef:CAMPAIGN[6],diagIdx:1},{caseRef:CAMPAIGN[7],diagIdx:1}]; buildResults(); toClose(); },
  'monthly-report-perfect': ()=>{ S.rank=1; S.trust=5; S.month=4; setRankBg(1); S.unlocked={calc:true,hearing:true,bsTab:false}; S.campIdx=6; S.monthCases=CAMPAIGN.slice(6,8);
    S.karte=[{caseRef:CAMPAIGN[6],diagIdx:1},{caseRef:CAMPAIGN[7],diagIdx:0}]; buildResults(); toClose(); },
  'monthly-report-miss': ()=>{ S.rank=1; S.trust=5; S.month=4; setRankBg(1); S.unlocked={calc:true,hearing:true,bsTab:false}; S.campIdx=6; S.monthCases=CAMPAIGN.slice(6,8);
    S.karte=[{caseRef:CAMPAIGN[6],diagIdx:0},{caseRef:CAMPAIGN[7],diagIdx:1}]; buildResults(); toClose(); },
  'promote1': ()=>{ S.rank=0; runPromoteAnim(1); },
  'promote3': ()=>{ S.rank=2; runPromoteAnim(3); },
  'promote-pre': ()=>{ S.rank=0; playPromote(1, ()=>{}); },
  'promote-post': ()=>{ S.rank=1; pendingAfterPromote=()=>{}; afterPromote(); },
  'unlock-calc': ()=>{ S.rank=0; S.trust=1; S.month=1; setRankBg(0); paintTrust(); S.unlocked={calc:false,hearing:false,bsTab:false}; afterPromoteContinue(CAMPAIGN.slice(2,4)); },
  'unlock-hearing': ()=>{ S.rank=1; S.trust=4; S.month=3; setRankBg(1); paintTrust(); S.unlocked={calc:true,hearing:false,bsTab:false}; afterPromoteContinue(CAMPAIGN.slice(6,8)); },
  'unlock-bs': ()=>{ S.rank=2; S.trust=6; S.month=5; setRankBg(2); paintTrust(); S.unlocked={calc:true,hearing:true,bsTab:false}; afterPromoteContinue(CAMPAIGN.slice(8,10)); },
  'ending': ()=>{ S.campIdx=CAMPAIGN.length; showEnding(); },
};
show('scr-title');
(function applyScene(){
  const sc=new URLSearchParams(location.search).get('scene');
  if(sc && SCENES[sc]){ try{ SCENES[sc](); }catch(e){ console.error('scene error:', sc, e); } }
})();
</script>
